services:
  wordpress:
    networks:
      - agruet
    build: ./requirements/wordpress
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/db_password.txt
      WORDPRESS_ADMIN_USER_FILE: /run/secrets/wp_admin.txt
      WORDPRESS_ADMIN_PASSWORD_FILE: /run/secrets/wp_password.txt
      DOMAIN_NAME: ${DOMAIN_NAME}
      WP_TITLE: ${WP_TITLE}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
    secrets:
      - db_password.txt
      - wp_admin.txt
      - wp_password.txt
    volumes:
      - wordpress_files:/var/www/html
    restart: always

  db:
    networks:
      - agruet
    build: ./requirements/mariadb
    env_file: .env
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD_FILE: /run/secrets/db_password.txt
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/db_root_password.txt
    secrets:
      - db_password.txt
      - db_root_password.txt
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
          test: ["CMD-SHELL", "mariadb-admin ping -S /run/mysqld/mysqld.sock --silent"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 30s
    restart: always

  nginx:
    networks:
      - agruet
    build: ./requirements/nginx
    ports:
      - "8443:443"
    volumes:
      - wordpress_files:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    secrets:
      - cert.pem
      - cert.key
    restart: always

volumes:
  db_data:
  wordpress_files:

secrets:
  db_password.txt:
    file: ../secrets/db_password.txt
  db_root_password.txt:
    file: ../secrets/db_root_password.txt
  cert.key:
    file: ../secrets/cert.key
  cert.pem:
    file: ../secrets/cert.pem
  wp_admin.txt:
    file: ../secrets/wp_admin.txt
  wp_password.txt:
    file: ../secrets/wp_password.txt

networks:
  agruet:

